name: 🤖 AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'ready_for_review')
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🏷️ Check labels (optional filtering)
        id: check-labels
        run: |
          # オプション: 特定のラベルがある場合のみレビュー実行
          # ラベルでフィルタリングしない場合は skip_review=false を設定
          echo "skip_review=false" >> $GITHUB_OUTPUT
          
          # ラベルフィルタリングを有効にする場合は以下のコメントを外す
          # LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | tr '\n' ' ')
          # if [[ "$LABELS" == *"ai-review"* ]]; then
          #   echo "skip_review=false" >> $GITHUB_OUTPUT
          # else
          #   echo "skip_review=true" >> $GITHUB_OUTPUT
          #   echo "::notice::Skipping AI review - 'ai-review' label not found"
          # fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Check required secrets
        if: steps.check-labels.outputs.skip_review == 'false'
        run: |
          echo "🔍 Checking required secrets..."
          
          if [[ -z "${{ secrets.DIFY_REVIEW_API_KEY }}" ]]; then
            echo "::error::DIFY_REVIEW_API_KEY secret is not set. Please configure it in repository Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          if [[ -z "${{ secrets.DIFY_BASE_URL }}" ]]; then
            echo "::warning::DIFY_BASE_URL secret is not set. Using default: https://dify.arklet.jp/v1"
            echo "DIFY_BASE_URL=https://dify.arklet.jp/v1" >> $GITHUB_ENV
          else
            echo "DIFY_BASE_URL=${{ secrets.DIFY_BASE_URL }}" >> $GITHUB_ENV
          fi
          
          echo "DIFY_REVIEW_API_KEY=${{ secrets.DIFY_REVIEW_API_KEY }}" >> $GITHUB_ENV
          echo "✅ Required secrets are properly configured"

      - name: 🔧 Setup dependencies
        if: steps.check-labels.outputs.skip_review == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: 📊 Get PR patch
        if: steps.check-labels.outputs.skip_review == 'false'
        id: get-patch
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          echo "🔍 Getting patch for PR #$PR_NUMBER"
          
          # GitHub API を使用してパッチを取得
          PATCH=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.patch" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")
          
          if [[ -z "$PATCH" ]]; then
            echo "::notice::No changes found in the PR"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # マルチライン対応
          echo "patch<<EOF" >> $GITHUB_OUTPUT
          echo "$PATCH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🤖 Get review suggestions from Dify
        if: steps.check-labels.outputs.skip_review == 'false' && steps.get-patch.outputs.has_changes == 'true'
        id: get-suggestions
        env:
          PR_PATCH: ${{ steps.get-patch.outputs.patch }}
        run: |
          echo "=== Starting AI code review ==="
          
          # JSONペイロードを生成
          REQUEST_JSON=$(jq -n --arg patch "$PR_PATCH" '{ 
            inputs: { 
              patch: $patch
            }, 
            response_mode: "blocking", 
            user: "github-actions-ai-review" 
          }')
          
          echo "=== Making API call to Dify ==="
          RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" -X POST "$DIFY_BASE_URL/workflows/run" \
            -H "Authorization: Bearer $DIFY_REVIEW_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_JSON")
          
          # HTTPステータスコードを抽出
          HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
          
          echo "HTTP Status Code: $HTTP_CODE"
          
          # エラーチェック
          if [[ "$HTTP_CODE" -ge 400 ]]; then
            echo "::error::Dify API HTTP Error: $HTTP_CODE"
            echo "::error::Response: $RESPONSE_BODY"
            exit 1
          fi
          
          # Difyの出力から review_suggestions を抽出
          # まず text フィールドから JSON文字列を取得
          TEXT_OUTPUT=$(echo "$RESPONSE_BODY" | jq -r '.data.outputs.text // empty')
          
          if [[ -n "$TEXT_OUTPUT" && "$TEXT_OUTPUT" != "null" ]]; then
            # text フィールドの JSON文字列をパースして review_suggestions を取得
            SUGGESTIONS=$(echo "$TEXT_OUTPUT" | jq -r '.review_suggestions // empty')
          else
            # 直接 review_suggestions フィールドを確認（フォールバック）
            SUGGESTIONS=$(echo "$RESPONSE_BODY" | jq -r '.data.outputs.review_suggestions // empty')
          fi
          
          if [[ -z "$SUGGESTIONS" || "$SUGGESTIONS" == "null" ]]; then
            echo "::notice::No review suggestions generated"
            echo "has_suggestions=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Received review suggestions"
          echo "$SUGGESTIONS" | jq .
          
          echo "has_suggestions=true" >> $GITHUB_OUTPUT
          
          # 一時ファイルに保存
          echo "$SUGGESTIONS" > /tmp/suggestions.json

      - name: 📝 Post review comments
        if: steps.check-labels.outputs.skip_review == 'false' && steps.get-suggestions.outputs.has_suggestions == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          
          echo "📝 Posting review comments to PR #$PR_NUMBER"
          
          # suggestions.json からレビューコメントを作成
          SUGGESTIONS=$(cat /tmp/suggestions.json)
          
          # 各 suggestion をループ処理
          echo "$SUGGESTIONS" | jq -c '.[]' | while read -r suggestion; do
            FILE=$(echo "$suggestion" | jq -r '.file')
            LINE=$(echo "$suggestion" | jq -r '.line')
            SUGGESTION_CODE=$(echo "$suggestion" | jq -r '.suggestion')
            COMMENT=$(echo "$suggestion" | jq -r '.comment // ""')
            
            echo "🔍 Processing suggestion for $FILE:$LINE"
            
            # コメント本文を作成（suggestion ブロック付き）
            if [[ -n "$COMMENT" ]]; then
              # コメントありの場合
              BODY="$COMMENT"$'\n\n'"$(echo '```suggestion')"$'\n'"$SUGGESTION_CODE"$'\n'"$(echo '```')"
            else
              # コメントなしの場合
              BODY="$(echo '```suggestion')"$'\n'"$SUGGESTION_CODE"$'\n'"$(echo '```')"
            fi
            
            # GitHub API でレビューコメントを作成
            API_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
              -d "$(jq -n \
                --arg path "$FILE" \
                --arg line "$LINE" \
                --arg side "RIGHT" \
                --arg body "$BODY" \
                --arg commit_id "$COMMIT_SHA" \
                '{
                  path: $path,
                  line: ($line | tonumber),
                  side: $side,
                  body: $body,
                  commit_id: $commit_id
                }')")
            
            # HTTPステータスコードを抽出
            HTTP_CODE=$(echo "$API_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
            RESPONSE_BODY=$(echo "$API_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
            
            if [[ "$HTTP_CODE" -ge 400 ]]; then
              echo "::warning::Failed to post comment for $FILE:$LINE (HTTP $HTTP_CODE)"
              echo "Response: $RESPONSE_BODY"
            else
              echo "✅ Posted suggestion for $FILE:$LINE"
            fi
          done
          
          echo "✅ All review comments posted!"

      - name: 📊 Summary
        if: always() && steps.check-labels.outputs.skip_review == 'false'
        run: |
          echo "## 🤖 AI Code Review Summary" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.get-patch.outputs.has_changes }}" == "false" ]]; then
            echo "No changes found in the PR." >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.get-suggestions.outputs.has_suggestions }}" == "true" ]]; then
            echo "✅ AI review completed successfully." >> $GITHUB_STEP_SUMMARY
            echo "**PR Number:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit SHA:** ${{ github.event.pull_request.head.sha }}" >> $GITHUB_STEP_SUMMARY
            
            # サジェスション数をカウント
            if [[ -f /tmp/suggestions.json ]]; then
              COUNT=$(jq '. | length' /tmp/suggestions.json)
              echo "**Suggestions Posted:** $COUNT" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ No review suggestions were generated for this PR." >> $GITHUB_STEP_SUMMARY
          fi