name: 🎯 PR Concierge - Auto PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-concierge:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔍 Check required secrets
        run: |
          echo "🔍 Checking required secrets..."
          
          if [[ -z "${{ secrets.DIFY_PR_API_KEY }}" ]]; then
            echo "::error::DIFY_PR_API_KEY secret is not set. Please configure it in repository Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          if [[ -z "${{ secrets.DIFY_BASE_URL }}" ]]; then
            echo "::warning::DIFY_BASE_URL secret is not set. Using default: https://dify.arklet.jp/v1"
            echo "DIFY_BASE_URL=https://dify.arklet.jp/v1" >> $GITHUB_ENV
          else
            echo "DIFY_BASE_URL=${{ secrets.DIFY_BASE_URL }}" >> $GITHUB_ENV
          fi
          
          # APIキーを環境変数にエクスポート
          echo "DIFY_PR_API_KEY=${{ secrets.DIFY_PR_API_KEY }}" >> $GITHUB_ENV
          
          echo "✅ Required secrets are properly configured"

      - name: 🔧 Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          
          # GitHub CLI をインストール
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh

      - name: 📊 Get PR diff
        id: get-diff
        run: |
          # PRの基準ブランチとの差分を取得
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          
          echo "🔍 Getting diff between $BASE_SHA and $HEAD_SHA"
          
          DIFF=$(git diff "$BASE_SHA...$HEAD_SHA")
          
          if [[ -z "$DIFF" ]]; then
            echo "::notice::No changes found in the PR"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # マルチライン対応
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🤖 Generate PR description
        id: generate-description
        if: steps.get-diff.outputs.has_changes == 'true'
        env:
          PR_DIFF: ${{ steps.get-diff.outputs.diff }}
        run: |
          echo "=== Starting PR description generation ==="
          
          echo "=== Preparing JSON payload ==="
          # JSONペイロードを生成（jqを使用して安全にエスケープ）
          REQUEST_JSON=$(jq -n --arg diff "$PR_DIFF" --arg env "frontend" '{ inputs: { diff: $diff, env: $env }, response_mode: "blocking", user: "github-actions-pr-concierge" }')
          
          echo "=== Making API call ==="
          echo "API Endpoint: $DIFY_BASE_URL/workflows/run"
          echo "API Key prefix: $(echo "$DIFY_PR_API_KEY" | head -c 8)..."
          
          # APIキーが設定されているか確認
          if [[ -z "$DIFY_PR_API_KEY" ]]; then
            echo "::error::DIFY_PR_API_KEY environment variable is empty"
            exit 1
          fi
          
          RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" -X POST "$DIFY_BASE_URL/workflows/run" \
            -H "Authorization: Bearer $DIFY_PR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_JSON")
          CURL_EXIT_CODE=$?
          
          echo "=== Processing response ==="
          # HTTPステータスコードを抽出
          HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response Body: $RESPONSE_BODY"
          
          # cURLエラーチェック (最初にチェック)
          if [[ $CURL_EXIT_CODE -ne 0 ]]; then
            echo "::error::Failed to call Dify API (curl error code: $CURL_EXIT_CODE)"
            exit 1
          fi
          
          # HTTPエラーチェック
          if [[ "$HTTP_CODE" -ge 400 ]]; then
            echo "::error::Dify API HTTP Error: $HTTP_CODE"
            echo "::error::Response: $RESPONSE_BODY"
            exit 1
          fi
          
          # JSON エラーチェック
          ERROR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error // empty')
          if [[ -n "$ERROR_MSG" ]]; then
            echo "::error::Dify API Error: $ERROR_MSG"
            echo "::error::Full Response: $RESPONSE_BODY"
            exit 1
          fi
          
          # PR本文抽出
          PR_BODY=$(echo "$RESPONSE_BODY" | jq -r '.data.outputs.pr_body_md // .data.outputs.text // empty')
          
          if [[ -z "$PR_BODY" || "$PR_BODY" == "null" ]]; then
            echo "::error::Failed to generate PR description. No valid output found."
            echo "::error::Expected 'data.outputs.pr_body_md' or 'data.outputs.text' field"
            echo "::error::API Response: $RESPONSE_BODY"
            exit 1
          fi
          
          echo "✅ Generated PR description:"
          echo "$PR_BODY"
          
          # マルチライン対応
          echo "pr_body<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "=== Script completed successfully ==="

      - name: 📝 Update PR description
        if: steps.generate-description.outputs.pr_body != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENERATED_BODY: ${{ steps.generate-description.outputs.pr_body }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          echo "📝 Updating PR #$PR_NUMBER with AI-generated description"
          
          # 既存のPR本文を取得
          CURRENT_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          
          # 一時ファイルに新しい本文を作成
          if echo "$CURRENT_BODY" | grep -q "<!-- AI-GENERATED-CONTENT -->"; then
            echo "PR already has AI-generated content, updating..."
            # 既存のAI生成コンテンツを置き換え
            {
              echo "$CURRENT_BODY" | sed '/<!-- AI-GENERATED-CONTENT -->/,/<!-- \/AI-GENERATED-CONTENT -->/d'
              echo "<!-- AI-GENERATED-CONTENT -->"
              echo "$GENERATED_BODY"
              echo "<!-- /AI-GENERATED-CONTENT -->"
            } > /tmp/new_body.md
          else
            if [[ -n "$CURRENT_BODY" && "$CURRENT_BODY" != "null" ]]; then
              {
                echo "$CURRENT_BODY"
                echo ""
                echo "---"
                echo ""
                echo "<!-- AI-GENERATED-CONTENT -->"
                echo "$GENERATED_BODY"
                echo "<!-- /AI-GENERATED-CONTENT -->"
              } > /tmp/new_body.md
            else
              {
                echo "<!-- AI-GENERATED-CONTENT -->"
                echo "$GENERATED_BODY"
                echo "<!-- /AI-GENERATED-CONTENT -->"
              } > /tmp/new_body.md
            fi
          fi
          
          # PR本文を更新
          gh pr edit "$PR_NUMBER" --body-file /tmp/new_body.md
          
          echo "✅ PR description updated successfully!"

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎯 PR Concierge Summary" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.get-diff.outputs.has_changes }}" == "false" ]]; then
            echo "No changes found in the PR." >> $GITHUB_STEP_SUMMARY
          elif [[ -n "${{ steps.generate-description.outputs.pr_body }}" ]]; then
            echo "✅ PR description was successfully generated and updated by AI." >> $GITHUB_STEP_SUMMARY
            echo "**PR Number:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** frontend" >> $GITHUB_STEP_SUMMARY
            echo "**Base Branch:** ${{ github.event.pull_request.base.ref }}" >> $GITHUB_STEP_SUMMARY
            echo "**Head Branch:** ${{ github.event.pull_request.head.ref }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to generate PR description." >> $GITHUB_STEP_SUMMARY
          fi 